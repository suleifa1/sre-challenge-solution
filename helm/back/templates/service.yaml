apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.app.name }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.app.port }}
    targetPort: http
    protocol: TCP
    name: http
  - port: {{ .Values.app.managementPort }}
    targetPort: management
    protocol: TCP
    name: management
  selector:
    app: {{ .Values.app.name }}
