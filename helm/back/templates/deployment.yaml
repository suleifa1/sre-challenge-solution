apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.app.name }}
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.app.name }}
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z {{ .Values.dependencies.postgres.host }} {{ .Values.dependencies.postgres.port }}; do echo waiting for postgres; sleep 2; done']
      - name: wait-for-kafka
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z {{ .Values.dependencies.kafka.host }} {{ .Values.dependencies.kafka.port }}; do echo waiting for kafka; sleep 2; done']

      containers:
      - name: {{ .Values.app.name }}
        image: "{{ .Values.app.image }}"
        imagePullPolicy: {{ .Values.app.imagePullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.app.port }}
        - name: management
          containerPort: {{ .Values.app.managementPort }}

        env:
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password

        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true

        livenessProbe:
          httpGet:
            path: /health
            port: management
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: management
          initialDelaySeconds: 20
          periodSeconds: 5

        resources:
          requests:
            cpu: {{ .Values.app.resources.requests.cpu }}
            memory: {{ .Values.app.resources.requests.memory }}
          limits:
            cpu: {{ .Values.app.resources.limits.cpu }}
            memory: {{ .Values.app.resources.limits.memory }}

        args:
        - "--spring.config.additional-location=file:///config/application.yaml"

      volumes:
      - name: config
        configMap:
          name: {{ .Values.app.name }}-config
